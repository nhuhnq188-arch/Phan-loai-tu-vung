<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinh tế học - Phân loại thuật ngữ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'economics_game';

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            window.db = db;
            window.auth = auth;
            window.appId = appId;
            window.firestoreRefs = { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, doc, setDoc };

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    document.getElementById('db-status').innerText = "🟢 Hệ thống đã sẵn sàng";
                    document.getElementById('db-status').classList.replace('text-slate-400', 'text-green-500');
                } catch (e) {
                    document.getElementById('db-status').innerText = "🔴 Lỗi kết nối database";
                    document.getElementById('db-status').classList.replace('text-slate-400', 'text-red-500');
                }
            };
            initAuth();

            onAuthStateChanged(auth, (user) => {
                if (user) loadGoldBoard();
            });
        } catch (err) { console.error(err); }
    </script>
    <style>
        body { background-color: #f8fafc; touch-action: manipulation; font-family: system-ui, -apple-system, sans-serif; }
        .item-card { transition: all 0.2s ease; cursor: grab; user-select: none; touch-action: none; position: relative; z-index: 10; }
        .item-card:active { cursor: grabbing; transform: scale(1.05); z-index: 50; }
        .drop-active { border-color: #6366f1 !important; background-color: #f5f3ff; }
        .correct { border-color: #10b981 !important; background-color: #f0fdf4 !important; pointer-events: none; opacity: 0.6; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        .modal-open { overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <!-- Màn hình chờ nhập tên -->
        <div id="login-overlay" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl border border-white/10">
                <h1 class="text-2xl font-black text-slate-800 mb-2">Học phần Kinh tế</h1>
                <p class="text-slate-500 mb-6 text-sm font-medium">Nhập tên để bắt đầu bài học</p>
                <input type="text" id="player-name" placeholder="Họ và tên của em..." 
                       class="w-full p-4 border-2 border-slate-100 rounded-xl mb-4 focus:border-indigo-500 outline-none text-center font-bold text-lg transition-all">
                <button onclick="startGame()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-black shadow-lg hover:bg-indigo-700 active:scale-95 transition-all mb-3">Vào chơi ngay</button>
                <button onclick="toggleLeaderboard(true)" class="w-full py-3 bg-white border border-slate-200 text-slate-600 rounded-xl font-bold text-sm hover:bg-slate-50 transition-all uppercase tracking-wider">Xem Bảng Vàng</button>
                <div id="db-status" class="mt-6 text-[10px] font-bold uppercase tracking-widest text-slate-400 italic">Đang kết nối...</div>
            </div>
        </div>

        <header class="flex justify-between items-center mb-8 pb-4 border-b border-slate-200">
            <div>
                <h2 class="text-xl font-black text-slate-800" id="user-display">Kinh tế học</h2>
                <button onclick="toggleLeaderboard(true)" class="text-[10px] text-indigo-600 font-bold uppercase tracking-widest hover:underline mt-1">🏆 Xem xếp hạng hiện tại</button>
            </div>
            <div class="bg-white px-5 py-2 rounded-2xl shadow-sm border border-slate-100">
                <div class="text-2xl font-mono font-black text-indigo-600" id="timer">00:00</div>
            </div>
        </header>

        <div id="game-ui" class="hidden">
            <div class="bg-white p-6 rounded-3xl border border-slate-100 mb-6 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black uppercase text-slate-400 tracking-widest font-bold">Danh sách thuật ngữ</span>
                    <span id="count-tag" class="text-[10px] font-black text-indigo-500 bg-indigo-50 px-2 py-1 rounded-md uppercase"></span>
                </div>
                <div id="pool" class="flex flex-wrap gap-2 justify-center min-h-[100px]"></div>
            </div>

            <div id="zones" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"></div>

            <div class="flex flex-col items-center gap-4">
                <button id="check-btn" class="px-12 py-5 bg-slate-900 text-white font-black rounded-2xl uppercase text-xs tracking-[0.2em] hover:bg-slate-800 transition-all shadow-xl active:scale-95">Kiểm tra đáp án</button>
                <button id="save-btn" class="hidden px-12 py-5 bg-amber-500 text-white font-black rounded-2xl uppercase text-xs tracking-[0.2em] animate-bounce shadow-xl active:scale-95">Lưu Kỷ Lục</button>
            </div>
        </div>

        <!-- Bảng Vàng Modal -->
        <div id="leaderboard-modal" class="hidden fixed inset-0 z-[60] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-lg rounded-[2.5rem] overflow-hidden shadow-2xl animate-in zoom-in-95 duration-200">
                <div class="bg-amber-400 p-6 flex justify-between items-center">
                    <div class="text-white">
                        <h3 class="text-xl font-black uppercase tracking-tighter">Bảng Vàng Danh Dự</h3>
                        <p class="text-amber-100 text-[10px] font-bold uppercase tracking-widest">Cập nhật trực tuyến</p>
                    </div>
                    <button onclick="toggleLeaderboard(false)" class="bg-white/20 hover:bg-white/40 p-2 rounded-full text-white transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
                <div class="max-h-[60vh] overflow-y-auto">
                    <table class="w-full text-left">
                        <tbody id="board-rows" class="divide-y divide-slate-50">
                            <!-- Dữ liệu từ Firebase -->
                        </tbody>
                    </table>
                </div>
                <div class="p-6 bg-slate-50 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-4 italic">Bảng vàng tự động cập nhật khi có sinh viên mới hoàn thành</p>
                    <button onclick="toggleLeaderboard(false)" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-lg shadow-indigo-100">Quay lại trò chơi</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const data = {
            cats: [{ id: "c1", n: "Banking and tax" }, { id: "c2", n: "Import-export" }, { id: "c3", n: "Market issues" }],
            items: [
                { t: "Assets", c: "c1" }, { t: "Tax avoidance", c: "c1" }, { t: "Interest rate", c: "c1" }, { t: "Exchange rate", c: "c1" }, { t: "Financial capital", c: "c1" }, { t: "Fiscal policy", c: "c1" }, { t: "Installment", c: "c1" },
                { t: "Customs", c: "c2" }, { t: "Cargo", c: "c2" }, { t: "Tariff", c: "c2" }, { t: "Distribution", c: "c2" }, { t: "Oil shipment", c: "c2" }, { t: "Bill of Lading", c: "c2" }, { t: "Import Quota", c: "c2" },
                { t: "Recession", c: "c3" }, { t: "Fluctuation", c: "c3" }, { t: "Competitiveness", c: "c3" }, { t: "Purchasing power", c: "c3" }, { t: "Niche market", c: "c3" }, { t: "Market share", c: "c3" }, { t: "Market penetration", c: "c3" }
            ]
        };

        let playerName = ""; let startTime = null; let dragged = null; let timerInt = null;

        function toggleLeaderboard(show) {
            const modal = document.getElementById('leaderboard-modal');
            if (show) {
                modal.classList.remove('hidden');
                document.body.classList.add('modal-open');
            } else {
                modal.classList.add('hidden');
                document.body.classList.remove('modal-open');
            }
        }

        function startGame() {
            playerName = document.getElementById('player-name').value.trim();
            if (playerName.length < 2) return document.getElementById('player-name').classList.add('shake');
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('user-display').innerHTML = `
                <div class="text-xs text-slate-400 font-bold uppercase tracking-widest">Đang chơi</div>
                <div class="text-lg font-black text-slate-800">${playerName}</div>
            `;
            startTime = Date.now();
            timerInt = setInterval(() => {
                const sec = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').innerText = `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
            }, 1000);
            render();
        }

        function render() {
            const zones = document.getElementById('zones');
            const pool = document.getElementById('pool');
            zones.innerHTML = data.cats.map(c => `
                <div class="bg-white rounded-[2rem] border-2 border-slate-100 flex flex-col min-h-[250px] shadow-sm transition-all overflow-hidden">
                    <div class="bg-slate-50 p-3 text-center text-[10px] font-black uppercase text-slate-400 border-b tracking-widest">${c.n}</div>
                    <div class="zone-drop p-4 flex-grow flex flex-wrap gap-2 content-start" data-cid="${c.id}"></div>
                </div>
            `).join('');
            pool.innerHTML = [...data.items].sort(() => Math.random() - 0.5).map((i, idx) => `
                <div class="item-card px-4 py-2.5 bg-white border border-slate-200 rounded-xl shadow-sm text-sm font-bold text-slate-700 hover:border-indigo-400 hover:shadow-md" draggable="true" data-correct="${i.c}">${i.t}</div>
            `).join('');
            initDnd();
            updateCount();
        }

        function updateCount() {
            const num = document.getElementById('pool').children.length;
            document.getElementById('count-tag').innerText = num > 0 ? `Còn ${num} từ` : "Xong!";
        }

        function initDnd() {
            const items = document.querySelectorAll('.item-card');
            const targets = document.querySelectorAll('.zone-drop, #pool');
            items.forEach(el => {
                el.ondragstart = () => { dragged = el; el.style.opacity = "0.5"; };
                el.ondragend = () => { dragged = null; el.style.opacity = "1"; };
                el.ontouchstart = (e) => { dragged = el; };
                el.ontouchend = (e) => {
                    const t = e.changedTouches[0];
                    const target = document.elementFromPoint(t.clientX, t.clientY)?.closest('.zone-drop, #pool');
                    if (target && dragged) { target.appendChild(dragged); updateCount(); }
                    dragged = null;
                };
            });
            targets.forEach(t => {
                t.ondragover = (e) => { e.preventDefault(); t.classList.add('drop-active'); };
                t.ondragleave = () => t.classList.remove('drop-active');
                t.ondrop = (e) => { e.preventDefault(); t.classList.remove('drop-active'); if (dragged) { t.appendChild(dragged); updateCount(); } };
            });
        }

        document.getElementById('check-btn').onclick = () => {
            let correct = 0;
            document.querySelectorAll('.item-card').forEach(el => {
                const zone = el.closest('.zone-drop');
                if (zone && zone.dataset.cid === el.dataset.correct) {
                    el.classList.add('correct'); el.draggable = false; correct++;
                } else if (zone) {
                    document.getElementById('pool').appendChild(el);
                    el.classList.add('shake'); setTimeout(() => el.classList.remove('shake'), 400);
                }
            });
            updateCount();
            if (correct === data.items.length) {
                clearInterval(timerInt);
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('save-btn').classList.remove('hidden');
            }
        };

        document.getElementById('save-btn').onclick = async () => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const timeStr = document.getElementById('timer').innerText;
            if (window.auth.currentUser) {
                const { db, firestoreRefs, appId } = window;
                try {
                    await firestoreRefs.addDoc(firestoreRefs.collection(db, 'artifacts', appId, 'public', 'data', 'history'), {
                        name: playerName, time: timeStr, sec: elapsed, at: firestoreRefs.serverTimestamp()
                    });
                    toggleLeaderboard(true);
                    document.getElementById('game-ui').innerHTML = `
                        <div class="bg-white p-12 rounded-[2.5rem] border border-slate-100 shadow-xl text-center">
                            <div class="mb-4 text-5xl">🏆</div>
                            <h3 class="text-2xl font-black text-slate-800 mb-2">Chúc mừng em đã hoàn thành!</h3>
                            <p class="text-slate-500 mb-8 font-medium">Kết quả của em đã được lưu vào Bảng Vàng.</p>
                            <button onclick="location.reload()" class="px-8 py-3 bg-slate-900 text-white rounded-xl font-bold uppercase tracking-widest text-xs">Chơi lại lần nữa</button>
                        </div>
                    `;
                } catch (e) {
                    alert("Lỗi lưu điểm. Vui lòng kiểm tra kết nối mạng.");
                }
            }
        };

        function loadGoldBoard() {
            if (!window.db || !window.auth.currentUser) return;
            const { db, firestoreRefs, appId } = window;
            
            // QUAN TRỌNG: Không dùng orderBy trong query để tránh lỗi Rules thiếu Index
            const q = firestoreRefs.collection(db, 'artifacts', appId, 'public', 'data', 'history');
            
            firestoreRefs.onSnapshot(q, (snap) => {
                // Sắp xếp dữ liệu trong bộ nhớ (Memory) thay vì dùng query phức tạp
                const sortedDocs = snap.docs
                    .map(doc => doc.data())
                    .sort((a, b) => (a.sec || 999) - (b.sec || 999));

                const rows = sortedDocs.slice(0, 15).map((item, i) => {
                    const isMe = item.name === playerName;
                    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
                    return `
                        <tr class="border-b border-slate-50 transition-colors ${isMe ? 'bg-indigo-50/50' : ''}">
                            <td class="p-5 font-black text-slate-300 w-16 text-center text-lg">${medal}</td>
                            <td class="p-5 font-bold text-slate-700">
                                ${item.name}
                                ${isMe ? '<span class="ml-2 text-[8px] bg-indigo-600 text-white px-1.5 py-0.5 rounded uppercase">Của bạn</span>' : ''}
                            </td>
                            <td class="p-5 text-right font-mono font-black text-indigo-600">${item.time}</td>
                        </tr>
                    `;
                }).join('');
                
                document.getElementById('board-rows').innerHTML = rows || `
                    <tr><td class="p-12 text-center text-slate-400 italic font-medium">Chưa có ai ghi danh. Hãy là người đầu tiên!</td></tr>
                `;
            }, (err) => {
                console.error("Firebase Error Details:", err);
                document.getElementById('board-rows').innerHTML = `<tr><td class="p-10 text-center text-red-400">Không thể tải dữ liệu (Lỗi Rules Firestore)</td></tr>`;
            });
        }
    </script>
</body>
</html>
