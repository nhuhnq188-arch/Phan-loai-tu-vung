<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phân loại từ vựng - Bảng Vàng Vinh Danh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzYhkAdY03YN40A71OrIqh4qKGpN0YnBM",
            authDomain: "game-phan-loai.firebaseapp.com",
            projectId: "game-phan-loai",
            storageBucket: "game-phan-loai.firebasestorage.app",
            messagingSenderId: "916490432151",
            appId: "1:916490432151:web:d6081da627ebd50ca2c3d2",
            measurementId: "G-WGJJ01VF97"
        };

        const appId = 'group-sort-economics-v2';

        const initFirebase = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                window.db = db;
                window.auth = auth;
                window.appId = appId;
                window.firestoreRefs = { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, deleteDoc, doc };

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        console.log("Firebase Connected: ", user.uid);
                        // Tải bảng vàng sẵn sàng
                        loadGoldBoard(); 
                    } else {
                        signInAnonymously(auth).catch(err => console.error("Auth Error:", err));
                    }
                });

            } catch (error) { 
                console.error("Firebase Init Error:", error);
            }
        };
        
        initFirebase();
    </script>
    <style>
        body { overflow-x: hidden; touch-action: manipulation; }
        .group-sort-item { transition: all 0.2s ease; cursor: grab; touch-action: none; user-select: none; }
        .group-sort-item:active { cursor: grabbing; transform: scale(1.05); z-index: 50; }
        .correct-placement { border: 2px solid #10b981 !important; background-color: #ecfdf5 !important; cursor: default !important; pointer-events: none; opacity: 0.8; }
        .incorrect-placement { border: 2px solid #ef4444 !important; animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .dropzone-active { border-color: #3b82f6 !important; background-color: #eff6ff; }
        .gold-glow { box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); border: 2px solid #f59e0b; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div class="max-w-4xl mx-auto p-4">
        <!-- Màn hình Đăng nhập tên -->
        <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/95 backdrop-blur-md">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border mx-4 animate-in zoom-in duration-300">
                <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 rotate-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                </div>
                <h2 class="text-3xl font-black mb-2 text-slate-800 tracking-tight">Thử thách từ vựng</h2>
                <p class="text-slate-500 mb-8 text-sm font-medium italic">"Học đi đôi với hành"</p>
                <div class="relative mb-6">
                    <input type="text" id="student-name" placeholder="Nhập họ và tên của em..." 
                           class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none text-lg font-bold transition-all">
                </div>
                <button id="start-btn" class="w-full py-5 bg-blue-600 text-white font-black rounded-2xl hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all active:scale-95 uppercase tracking-widest text-sm">Vào lớp ngay</button>
            </div>
        </div>

        <!-- Thanh tiêu đề game -->
        <header class="flex justify-between items-center mb-8 border-b border-slate-200 pb-5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 6h16M4 12h16m-7 6h7" /></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 uppercase tracking-tighter leading-none">Phân loại từ vựng</h1>
                    <p id="current-user-tag" class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1"></p>
                </div>
            </div>
            <button id="admin-lock-btn" class="w-10 h-10 flex items-center justify-center rounded-xl text-slate-300 hover:bg-white hover:text-slate-500 transition-all border border-transparent hover:border-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </button>
        </header>

        <main id="game-content" class="opacity-30 pointer-events-none transition-all duration-700">
            <div id="play-area">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 mb-8 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                    <p class="text-[10px] uppercase font-black text-slate-400 mb-4 tracking-[0.3em]">Kéo từ vựng vào đúng nhóm bên dưới</p>
                    <div id="items-pool" class="flex flex-wrap justify-center gap-3 min-h-[80px]"></div>
                </div>

                <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10"></div>

                <div class="flex flex-col items-center gap-4">
                    <button id="check-btn" class="group relative px-10 py-5 bg-slate-900 text-white font-black rounded-2xl shadow-2xl hover:bg-slate-800 transition-all uppercase text-sm tracking-widest overflow-hidden">
                        <span class="relative z-10">Kiểm tra kết quả</span>
                        <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </button>
                    <button id="finish-btn" class="hidden px-12 py-5 bg-amber-500 text-white font-black rounded-2xl shadow-xl hover:bg-amber-600 animate-bounce uppercase text-sm tracking-[0.2em] border-b-4 border-amber-700 active:border-b-0 active:translate-y-1 transition-all">Ghi tên lên Bảng Vàng</button>
                </div>
            </div>

            <!-- Kết quả & Bảng Vàng -->
            <div id="result-area" class="hidden space-y-12 pb-20 animate-in slide-in-from-bottom-10 duration-1000">
                <div class="p-1 bg-gradient-to-br from-blue-500 via-indigo-600 to-purple-600 rounded-[3rem] shadow-2xl max-w-sm mx-auto">
                    <div class="bg-white rounded-[2.9rem] p-10 text-center">
                        <h3 class="text-3xl font-black text-slate-800 tracking-tight" id="result-name">Họ Tên</h3>
                        <p class="text-xs text-slate-400 mt-2 font-bold uppercase tracking-widest">Đã hoàn thành thử thách!</p>
                        <div class="mt-6 flex justify-center gap-4 border-t border-slate-50 pt-6">
                            <div class="text-center px-4">
                                <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-1">Thời gian</p>
                                <p id="time-spent" class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">00:00</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="gold-glow bg-white rounded-[2.5rem] overflow-hidden shadow-2xl border border-amber-100">
                    <div class="bg-gradient-to-r from-amber-400 to-orange-500 p-6 text-center shadow-lg">
                        <h2 class="text-white font-black text-2xl tracking-[0.2em] uppercase flex items-center justify-center gap-3">⭐ BẢNG VÀNG LỚP HỌC ⭐</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="bg-amber-50/50 text-amber-900 font-black uppercase text-[10px] tracking-widest border-b border-amber-100">
                                <tr>
                                    <th class="p-6 text-center w-24">Hạng</th>
                                    <th class="p-6 text-left">Họ và Tên</th>
                                    <th class="p-6 text-center">Tốc độ</th>
                                    <th class="p-6 text-right pr-8">Thời điểm</th>
                                </tr>
                            </thead>
                            <tbody id="gold-board-body" class="divide-y divide-amber-50">
                                <!-- Dữ liệu từ Firebase -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="text-center">
                    <button onclick="location.reload()" class="px-6 py-3 bg-slate-100 text-slate-500 hover:text-slate-800 font-bold text-xs uppercase tracking-widest rounded-full transition-all">Chơi lại</button>
                </div>
            </div>
        </main>

        <!-- Admin Control -->
        <div id="admin-controls" class="mt-20 p-8 bg-red-50 rounded-[2rem] border-2 border-dashed border-red-200 hidden animate-in slide-in-from-top-4">
            <div class="flex justify-between items-center">
                <h3 class="text-red-700 font-black uppercase text-xs tracking-widest">Admin Control</h3>
                <button id="clear-btn" class="px-6 py-3 bg-red-600 text-white text-[10px] font-black rounded-xl uppercase shadow-lg hover:bg-red-700 transition-all">Xóa toàn bộ Bảng Vàng</button>
            </div>
        </div>
    </div>

    <!-- Modal Admin -->
    <div id="admin-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-slate-900/80 backdrop-blur-sm px-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center">
            <input type="password" id="admin-pass" placeholder="Mã PIN giáo viên..." class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-6 text-center outline-none focus:border-slate-400 font-black text-xl tracking-[0.5em]">
            <div class="flex gap-3">
                <button onclick="document.getElementById('admin-modal').classList.add('hidden')" class="flex-1 py-4 bg-slate-50 rounded-2xl font-bold text-slate-400">Hủy</button>
                <button id="confirm-admin" class="flex-1 py-4 bg-slate-800 text-white rounded-2xl font-black shadow-xl shadow-slate-200">Xác nhận</button>
            </div>
        </div>
    </div>

    <script>
        const rawData = {
            categories: [
                { id: "c1", name: "Ngân hàng & Thuế" },
                { id: "c2", name: "Xuất & Nhập khẩu" },
                { id: "c3", name: "Thị trường" }
            ],
            items: [
                { id: "i1", text: "Assets", cat: "c1" },
                { id: "i2", text: "Tax avoidance", cat: "c1" },
                { id: "i3", text: "Interest rate", cat: "c1" },
                { id: "i4", text: "Customs", cat: "c2" },
                { id: "i5", text: "Cargo", cat: "c2" },
                { id: "i6", text: "Tariff", cat: "c2" },
                { id: "i7", text: "Recession", cat: "c3" },
                { id: "i8", text: "Fluctuation", cat: "c3" },
                { id: "i9", text: "Competitiveness", cat: "c3" },
            ]
        };

        let draggedItem = null;
        let startTime = null;
        let studentName = "";

        document.getElementById('start-btn').onclick = () => {
            studentName = document.getElementById('student-name').value.trim();
            if (studentName.length < 2) return alert("Vui lòng nhập họ tên!");
            
            startTime = Date.now();
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-content').classList.remove('opacity-30', 'pointer-events-none');
            document.getElementById('current-user-tag').innerText = `Sinh viên: ${studentName}`;
            initGame();
        };

        function initGame() {
            const grid = document.getElementById('categories-grid');
            const pool = document.getElementById('items-pool');
            
            grid.innerHTML = rawData.categories.map(c => `
                <div class="bg-white rounded-[2rem] border-2 border-slate-100 flex flex-col min-h-[200px] shadow-sm overflow-hidden transition-all">
                    <div class="bg-slate-50 p-4 text-center text-[10px] font-black uppercase text-slate-500 border-b border-slate-100 tracking-[0.2em]">${c.name}</div>
                    <div class="dropzone p-5 flex-grow space-y-3 transition-colors" data-cat="${c.id}"></div>
                </div>
            `).join('');

            const shuffled = [...rawData.items].sort(() => Math.random() - 0.5);
            pool.innerHTML = shuffled.map(i => `
                <div class="group-sort-item p-4 bg-white border-2 border-slate-100 rounded-2xl shadow-sm text-sm font-bold text-slate-700 hover:border-blue-400" 
                     draggable="true" data-id="${i.id}" data-correct="${i.cat}">${i.text}</div>
            `).join('');

            setupDragDrop();
        }

        function setupDragDrop() {
            const items = document.querySelectorAll('.group-sort-item');
            const zones = document.querySelectorAll('.dropzone, #items-pool');

            items.forEach(item => {
                item.ondragstart = (e) => { draggedItem = item; item.style.opacity = "0.4"; };
                item.ondragend = () => { draggedItem = null; item.style.opacity = "1"; };
                
                // Hỗ trợ cảm ứng
                item.ontouchstart = (e) => { draggedItem = item; };
                item.ontouchend = (e) => {
                    const touch = e.changedTouches[0];
                    const zone = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.dropzone, #items-pool');
                    if (zone && draggedItem) {
                        zone.appendChild(draggedItem);
                        draggedItem = null;
                    }
                };
            });

            zones.forEach(zone => {
                zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dropzone-active'); };
                zone.ondragleave = () => zone.classList.remove('dropzone-active');
                zone.ondrop = (e) => {
                    e.preventDefault();
                    zone.classList.remove('dropzone-active');
                    if (draggedItem) zone.appendChild(draggedItem);
                };
            });
        }

        document.getElementById('check-btn').onclick = () => {
            const items = document.querySelectorAll('.group-sort-item');
            let correctCount = 0;

            items.forEach(item => {
                const zone = item.closest('.dropzone');
                if (zone && zone.dataset.cat === item.dataset.correct) {
                    item.classList.add('correct-placement');
                    item.draggable = false;
                    correctCount++;
                } else if (zone) {
                    item.classList.add('incorrect-placement');
                    setTimeout(() => { 
                        item.classList.remove('incorrect-placement');
                        document.getElementById('items-pool').appendChild(item);
                    }, 500);
                }
            });

            if (correctCount === rawData.items.length) {
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('finish-btn').classList.remove('hidden');
            }
        };

        document.getElementById('finish-btn').onclick = async () => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const durationDisplay = `${Math.floor(elapsed / 60)}p ${elapsed % 60}s`;
            
            document.getElementById('play-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('result-name').innerText = studentName;
            document.getElementById('time-spent').innerText = durationDisplay;

            if (window.db && window.firestoreRefs) {
                const { db, firestoreRefs, appId } = window;
                try {
                    await firestoreRefs.addDoc(firestoreRefs.collection(db, 'artifacts', appId, 'public', 'data', 'history'), {
                        name: studentName,
                        timeDisplay: durationDisplay,
                        timeSeconds: elapsed,
                        completedAt: firestoreRefs.serverTimestamp()
                    });
                } catch (e) { console.error("Save Error:", e); }
            }
        };

        function loadGoldBoard() {
            if (!window.db || !window.firestoreRefs) return;
            const { db, firestoreRefs, appId } = window;
            const q = firestoreRefs.query(
                firestoreRefs.collection(db, 'artifacts', appId, 'public', 'data', 'history'), 
                firestoreRefs.orderBy('timeSeconds', 'asc')
            );

            firestoreRefs.onSnapshot(q, (snap) => {
                const body = document.getElementById('gold-board-body');
                body.innerHTML = '';
                
                if (snap.empty) {
                    body.innerHTML = '<tr><td colspan="4" class="p-12 text-center text-slate-300 font-medium italic">Chưa có dữ liệu vinh danh...</td></tr>';
                    return;
                }

                snap.docs.forEach((doc, index) => {
                    const d = doc.data();
                    const rank = index + 1;
                    const isMe = d.name === studentName ? 'bg-blue-50/50' : '';
                    const dateStr = d.completedAt?.toDate().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'}) || 'Vừa xong';

                    body.innerHTML += `
                        <tr class="${isMe} transition-all hover:bg-slate-50">
                            <td class="p-6 text-center font-bold text-slate-500">${rank}</td>
                            <td class="p-6">
                                <span class="text-slate-800 font-bold">${d.name}</span>
                                ${d.name === studentName ? '<span class="ml-2 text-[8px] bg-blue-600 text-white px-2 py-0.5 rounded-full uppercase font-black">Bạn</span>' : ''}
                            </td>
                            <td class="p-6 text-center text-blue-600 font-black">${d.timeDisplay}</td>
                            <td class="p-6 text-right pr-8 text-slate-400 text-[10px] uppercase font-bold tracking-tighter">${dateStr}</td>
                        </tr>
                    `;
                });
            });
        }

        document.getElementById('admin-lock-btn').onclick = () => document.getElementById('admin-modal').classList.remove('hidden');
        document.getElementById('confirm-admin').onclick = () => {
            if (document.getElementById('admin-pass').value === "01026018") {
                document.getElementById('admin-modal').classList.add('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else { alert("Sai mã PIN!"); }
        };

        document.getElementById('clear-btn').onclick = async () => {
            if (!confirm("Xóa toàn bộ kết quả?")) return;
            const { db, firestoreRefs, appId } = window;
            const snap = await firestoreRefs.getDocs(firestoreRefs.collection(db, 'artifacts', appId, 'public', 'data', 'history'));
            await Promise.all(snap.docs.map(d => firestoreRefs.deleteDoc(firestoreRefs.doc(db, 'artifacts', appId, 'public', 'data', 'history', d.id))));
            alert("Đã xóa sạch Bảng Vàng!");
        };
    </script>
</body>
</html>
