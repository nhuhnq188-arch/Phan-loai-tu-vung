<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phân loại từ vựng Kinh tế - Bảng Vàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Cấu hình Firebase công khai để các tính năng Bảng Vàng hoạt động trên Vercel
        const firebaseConfig = {
            apiKey: "AIzaSyBzYhkAdY03YN40A71OrIqh4qKGpN0YnBM",
            authDomain: "game-phan-loai.firebaseapp.com",
            projectId: "game-phan-loai",
            storageBucket: "game-phan-loai.firebasestorage.app",
            messagingSenderId: "916490432151",
            appId: "1:916490432151:web:d6081da627ebd50ca2c3d2",
            measurementId: "G-WGJJ01VF97"
        };

        const appId = 'group-sort-economics-final';

        const initFirebase = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                window.db = db;
                window.auth = auth;
                window.appId = appId;
                window.firestoreRefs = { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, deleteDoc, doc };

                // Lắng nghe trạng thái đăng nhập ẩn danh để truy cập Database
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        loadGoldBoard(); 
                    } else {
                        signInAnonymously(auth).catch(err => console.error("Firebase Auth Error:", err));
                    }
                });

            } catch (error) { 
                console.error("Firebase Initialization Error:", error);
            }
        };
        
        initFirebase();
    </script>
    <style>
        body { overflow-x: hidden; touch-action: manipulation; background-color: #f8fafc; }
        .group-sort-item { transition: all 0.2s ease; cursor: grab; touch-action: none; user-select: none; }
        .group-sort-item:active { cursor: grabbing; transform: scale(1.05); z-index: 50; }
        .correct-placement { border: 2px solid #10b981 !important; background-color: #ecfdf5 !important; cursor: default !important; pointer-events: none; opacity: 0.7; }
        .incorrect-placement { border: 2px solid #ef4444 !important; animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .dropzone-active { border-color: #3b82f6 !important; background-color: #eff6ff; }
        .gold-glow { box-shadow: 0 0 20px rgba(245, 158, 11, 0.2); border: 2px solid #f59e0b; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>

    <script>
        // Dữ liệu trò chơi chính
        const rawData = {
            categories: [
                { id: "c1", name: "Banking and tax" },
                { id: "c2", name: "Import-export" },
                { id: "c3", name: "Market issues" }
            ],
            items: [
                { id: "i1", text: "Assets", cat: "c1" },
                { id: "i2", text: "Tax avoidance", cat: "c1" },
                { id: "i3", text: "Interest rate", cat: "c1" },
                { id: "i4", text: "Exchange rate", cat: "c1" },
                { id: "i5", text: "Financial capital", cat: "c1" },
                { id: "i6", text: "Fiscal policy", cat: "c1" },
                { id: "i7", text: "Installment", cat: "c1" },
                { id: "i10", text: "Customs", cat: "c2" },
                { id: "i11", text: "Cargo", cat: "c2" },
                { id: "i12", text: "Tariff", cat: "c2" },
                { id: "i13", text: "Distribution", cat: "c2" },
                { id: "i14", text: "Oil shipment", cat: "c2" },
                { id: "i15", text: "Bill of Lading", cat: "c2" },
                { id: "i16", text: "Import Quota", cat: "c2" },
                { id: "i20", text: "Recession", cat: "c3" },
                { id: "i21", text: "Fluctuation", cat: "c3" },
                { id: "i22", text: "Competitiveness", cat: "c3" },
                { id: "i23", text: "Purchasing power", cat: "c3" },
                { id: "i24", text: "Niche market", cat: "c3" },
                { id: "i25", text: "Market share", cat: "c3" },
                { id: "i26", text: "Market penetration", cat: "c3" }
            ]
        };

        let draggedItem = null;
        let startTime = null;
        let studentName = "";

        // Điều khiển luồng bắt đầu game
        document.getElementById('start-btn').onclick = () => {
            studentName = document.getElementById('student-name').value.trim();
            if (studentName.length < 2) return alert("Vui lòng nhập họ và tên để bắt đầu!");
            
            startTime = Date.now();
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-content').classList.remove('opacity-30', 'pointer-events-none');
            document.getElementById('current-user-tag').innerText = `Sinh viên: ${studentName}`;
            initGame();
        };

        // Khởi tạo giao diện kéo thả
        function initGame() {
            const grid = document.getElementById('categories-grid');
            const pool = document.getElementById('items-pool');
            
            grid.innerHTML = rawData.categories.map(c => `
                <div class="bg-white rounded-[2.5rem] border-2 border-slate-100 flex flex-col min-h-[300px] shadow-sm overflow-hidden transition-all hover:border-indigo-100">
                    <div class="bg-indigo-50/50 p-5 text-center text-[11px] font-black uppercase text-indigo-700 border-b border-slate-100 tracking-widest">${c.name}</div>
                    <div class="dropzone p-6 flex-grow flex flex-wrap content-start gap-2 transition-colors" data-cat="${c.id}"></div>
                </div>
            `).join('');

            const shuffled = [...rawData.items].sort(() => Math.random() - 0.5);
            updateCounterDisplay(shuffled.length);
            
            pool.innerHTML = shuffled.map(i => `
                <div class="group-sort-item px-5 py-3.5 bg-white border-2 border-slate-100 rounded-[1.2rem] shadow-sm text-sm font-bold text-slate-700 hover:border-indigo-400 hover:shadow-md" 
                     draggable="true" data-id="${i.id}" data-correct="${i.cat}">${i.text}</div>
            `).join('');

            setupDragDrop();
        }

        // Xử lý logic kéo thả (PC và Mobile)
        function setupDragDrop() {
            const items = document.querySelectorAll('.group-sort-item');
            const zones = document.querySelectorAll('.dropzone, #items-pool');

            items.forEach(item => {
                item.ondragstart = (e) => { 
                    draggedItem = item; 
                    item.style.opacity = "0.4"; 
                };
                item.ondragend = () => { 
                    draggedItem = null; 
                    item.style.opacity = "1"; 
                };
                
                // Cải thiện cảm giác trên Mobile
                item.ontouchstart = (e) => { draggedItem = item; };
                item.ontouchend = (e) => {
                    const touch = e.changedTouches[0];
                    const zone = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.dropzone, #items-pool');
                    if (zone && draggedItem) {
                        zone.appendChild(draggedItem);
                        draggedItem = null;
                        updateCounter();
                    }
                };
            });

            zones.forEach(zone => {
                zone.ondragover = (e) => { 
                    e.preventDefault(); 
                    zone.classList.add('dropzone-active'); 
                };
                zone.ondragleave = () => zone.classList.remove('dropzone-active');
                zone.ondrop = (e) => {
                    e.preventDefault();
                    zone.classList.remove('dropzone-active');
                    if (draggedItem) {
                        zone.appendChild(draggedItem);
                        updateCounter();
                    }
                };
            });
        }

        function updateCounter() {
            const remaining = document.getElementById('items-pool').querySelectorAll('.group-sort-item').length;
            updateCounterDisplay(remaining);
        }

        function updateCounterDisplay(count) {
            document.getElementById('items-counter').innerText = count > 0 ? `Còn ${count} thuật ngữ` : `Tuyệt vời! Đã xếp xong.`;
        }

        // Kiểm tra kết quả
        document.getElementById('check-btn').onclick = () => {
            const items = document.querySelectorAll('.group-sort-item');
            let correctCount = 0;

            items.forEach(item => {
                const zone = item.closest('.dropzone');
                if (zone && zone.dataset.cat === item.dataset.correct) {
                    item.classList.add('correct-placement');
                    item.draggable = false;
                    correctCount++;
                } else if (zone) {
                    item.classList.add('incorrect-placement');
                    setTimeout(() => { 
                        item.classList.remove('incorrect-placement');
                        document.getElementById('items-pool').appendChild(item);
                        updateCounter();
                    }, 600);
                }
            });

            if (correctCount === rawData.items.length) {
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('finish-btn').classList.remove('hidden');
            }
        };

        // Ghi danh và lưu vào Firebase
        document.getElementById('finish-btn').onclick = async () => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const durationDisplay = `${Math.floor(elapsed / 60)}p ${elapsed % 60}s`;
            
            showLeaderboard(durationDisplay);

            if (window.db && window.firestoreRefs) {
                const { db, firestoreRefs, appId } = window;
                try {
                    await firestoreRefs.addDoc(firestoreRefs.collection(db, 'artifacts', appId, 'public', 'data', 'history'), {
                        name: studentName,
                        timeDisplay: durationDisplay,
                        timeSeconds: elapsed,
                        completedAt: firestoreRefs.serverTimestamp()
                    });
                } catch (e) { console.error("Firebase Save Error:", e); }
            }
        };

        function showLeaderboard(personalTime = null) {
            document.getElementById('play-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            
            if (personalTime) {
                document.getElementById('summary-card').classList.remove('hidden');
                document.getElementById('result-name').innerText = studentName;
                document.getElementById('time-spent').innerText = personalTime;
            } else {
                document.getElementById('summary-card').classList.add('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Tải danh sách Bảng Vàng (Top 10)
        function loadGoldBoard() {
            if (!window.db || !window.firestoreRefs) return;
            const { db, firestoreRefs, appId } = window;
            const q = firestoreRefs.query(
                firestoreRefs.collection(db, 'artifacts', appId, 'public', 'data', 'history'), 
                firestoreRefs.orderBy('timeSeconds', 'asc')
            );

            firestoreRefs.onSnapshot(q, (snap) => {
                const body = document.getElementById('gold-board-body');
                body.innerHTML = '';
                
                if (snap.empty) {
                    body.innerHTML = '<tr><td colspan="4" class="p-16 text-center text-slate-300 font-medium italic">Chưa có ai ghi danh... Hãy là người đầu tiên!</td></tr>';
                    return;
                }

                snap.docs.slice(0, 10).forEach((doc, index) => {
                    const d = doc.data();
                    const rank = index + 1;
                    const isMe = d.name === studentName ? 'bg-indigo-50/50' : '';
                    
                    let dateStr = 'Vừa xong';
                    if (d.completedAt) {
                        const date = d.completedAt.toDate();
                        dateStr = date.toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
                    }

                    body.innerHTML += `
                        <tr class="${isMe} transition-all">
                            <td class="p-8 text-center font-black text-slate-400 text-lg">${rank}</td>
                            <td class="p-8 font-black text-slate-800">
                                ${d.name} ${d.name === studentName ? '<span class="ml-3 text-[8px] bg-indigo-600 text-white px-2.5 py-1 rounded-full uppercase tracking-widest">Bạn</span>' : ''}
                            </td>
                            <td class="p-8 text-center text-indigo-600 font-black text-xl">${d.timeDisplay}</td>
                            <td class="p-8 text-right pr-12 text-slate-400 text-[10px] font-bold uppercase tracking-tighter">${dateStr}</td>
                        </tr>
                    `;
                });
            });
        }

        // Quản lý cho Giáo viên
        document.getElementById('admin-lock-btn').onclick = () => document.getElementById('admin-modal').classList.remove('hidden');
        
        document.getElementById('confirm-admin').onclick = () => {
            if (document.getElementById('admin-pass').value === "01026018") {
                document.getElementById('admin-modal').classList.add('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else { alert("Mã PIN không đúng!"); }
        };

        document.getElementById('view-leaderboard-btn').onclick = () => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-content').classList.remove('opacity-30', 'pointer-events-none');
            showLeaderboard();
        };

        document.getElementById('clear-btn').onclick = async () => {
            if (!confirm("Hành động này sẽ XÓA TOÀN BỘ Bảng Vàng hiện tại. Bạn có chắc không?")) return;
            const { db, firestoreRefs, appId } = window;
            const snap = await firestoreRefs.getDocs(firestoreRefs.collection(db, 'artifacts', appId, 'public', 'data', 'history'));
            await Promise.all(snap.docs.map(d => firestoreRefs.deleteDoc(firestoreRefs.doc(db, 'artifacts', appId, 'public', 'data', 'history', d.id))));
            alert("Bảng xếp hạng đã được dọn sạch!");
        };
    </script>
</body>
</html>
