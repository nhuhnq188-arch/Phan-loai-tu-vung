<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinh tế học - Phân loại thuật ngữ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBzYhkAdY03YN40A71OrIqh4qKGpN0YnBM",
            authDomain: "game-phan-loai.firebaseapp.com",
            projectId: "game-phan-loai",
            storageBucket: "game-phan-loai.firebasestorage.app",
            messagingSenderId: "916490432151",
            appId: "1:916490432151:web:d6081da627ebd50ca2c3d2"
        };

        const appId = 'group-sort-economics-final';

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            window.db = db;
            window.auth = auth;
            window.appId = appId;
            window.firestoreRefs = { collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, getDocs, doc, setDoc };

            signInAnonymously(auth).then(() => {
                document.getElementById('db-status').innerText = "🟢 Đã kết nối hệ thống";
                document.getElementById('db-status').classList.add('text-green-500');
            }).catch(e => {
                document.getElementById('db-status').innerText = "🔴 Lỗi kết nối (Cần bật Anonymous Auth)";
                document.getElementById('db-status').classList.add('text-red-500');
            });

            onAuthStateChanged(auth, (user) => {
                if (user) loadGoldBoard();
            });
        } catch (err) { console.error(err); }
    </script>
    <style>
        body { background-color: #f8fafc; touch-action: manipulation; font-family: system-ui, -apple-system, sans-serif; }
        .item-card { transition: all 0.2s ease; cursor: grab; user-select: none; touch-action: none; }
        .item-card:active { cursor: grabbing; transform: scale(1.05); z-index: 50; }
        .drop-active { border-color: #6366f1 !important; background-color: #f5f3ff; }
        .correct { border-color: #10b981 !important; background-color: #f0fdf4 !important; pointer-events: none; opacity: 0.6; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <!-- Màn hình chờ nhập tên -->
        <div id="login-overlay" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl">
                <h1 class="text-2xl font-black text-slate-800 mb-2">Học phần Kinh tế</h1>
                <p class="text-slate-500 mb-6 text-sm">Nhập tên để bắt đầu bài học</p>
                <input type="text" id="player-name" placeholder="Họ và tên của em..." 
                       class="w-full p-4 border-2 border-slate-100 rounded-xl mb-4 focus:border-indigo-500 outline-none text-center font-bold text-lg">
                <button onclick="startGame()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-black shadow-lg hover:bg-indigo-700 transition-all">Vào học ngay</button>
                <div id="db-status" class="mt-6 text-[10px] font-bold uppercase tracking-widest text-slate-400 italic">Đang kiểm tra kết nối...</div>
            </div>
        </div>

        <header class="flex justify-between items-center mb-8 pb-4 border-b">
            <h2 class="text-xl font-black text-slate-800" id="user-display">Kinh tế học</h2>
            <div class="text-2xl font-mono font-black text-indigo-600" id="timer">00:00</div>
        </header>

        <div id="game-ui" class="hidden">
            <div class="bg-white p-6 rounded-3xl border mb-6 shadow-sm">
                <div id="pool" class="flex flex-wrap gap-2 justify-center min-h-[100px]"></div>
            </div>
            <div id="zones" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"></div>
            <div class="flex justify-center gap-4">
                <button id="check-btn" class="px-8 py-4 bg-slate-900 text-white font-black rounded-xl uppercase text-xs tracking-widest">Kiểm tra kết quả</button>
                <button id="save-btn" class="hidden px-8 py-4 bg-amber-500 text-white font-black rounded-xl uppercase text-xs tracking-widest animate-bounce">Ghi danh Bảng Vàng</button>
            </div>
        </div>

        <div id="leaderboard-ui" class="hidden max-w-xl mx-auto mt-4 bg-white rounded-3xl overflow-hidden shadow-xl border">
            <div class="bg-amber-400 p-6 text-center text-white font-black uppercase tracking-widest">Bảng Vàng Danh Dự</div>
            <table class="w-full text-left">
                <tbody id="board-rows" class="divide-y"></tbody>
            </table>
            <div class="p-6 text-center"><button onclick="location.reload()" class="text-indigo-600 font-bold text-sm">CHƠI LẠI</button></div>
        </div>
    </div>

    <script>
        const data = {
            cats: [{ id: "c1", n: "Banking and tax" }, { id: "c2", n: "Import-export" }, { id: "c3", n: "Market issues" }],
            items: [
                { t: "Assets", c: "c1" }, { t: "Tax avoidance", c: "c1" }, { t: "Interest rate", c: "c1" }, { t: "Exchange rate", c: "c1" }, { t: "Financial capital", c: "c1" }, { t: "Fiscal policy", c: "c1" }, { t: "Installment", c: "c1" },
                { t: "Customs", c: "c2" }, { t: "Cargo", c: "c2" }, { t: "Tariff", c: "c2" }, { t: "Distribution", c: "c2" }, { t: "Oil shipment", c: "c2" }, { t: "Bill of Lading", c: "c2" }, { t: "Import Quota", c: "c2" },
                { t: "Recession", c: "c3" }, { t: "Fluctuation", c: "c3" }, { t: "Competitiveness", c: "c3" }, { t: "Purchasing power", c: "c3" }, { t: "Niche market", c: "c3" }, { t: "Market share", c: "c3" }, { t: "Market penetration", c: "c3" }
            ]
        };

        let playerName = ""; let startTime = null; let dragged = null; let timerInt = null;

        function startGame() {
            playerName = document.getElementById('player-name').value.trim();
            if (playerName.length < 2) return document.getElementById('player-name').classList.add('shake');
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('user-display').innerText = `Sinh viên: ${playerName}`;
            startTime = Date.now();
            timerInt = setInterval(() => {
                const sec = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('timer').innerText = `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
            }, 1000);
            render();
        }

        function render() {
            const zones = document.getElementById('zones');
            const pool = document.getElementById('pool');
            zones.innerHTML = data.cats.map(c => `
                <div class="bg-white rounded-2xl border-2 flex flex-col min-h-[250px]">
                    <div class="bg-slate-50 p-3 text-center text-[10px] font-black uppercase text-slate-400 border-b tracking-widest">${c.n}</div>
                    <div class="zone-drop p-4 flex-grow flex flex-wrap gap-2 content-start" data-cid="${c.id}"></div>
                </div>
            `).join('');
            pool.innerHTML = [...data.items].sort(() => Math.random() - 0.5).map((i, idx) => `
                <div class="item-card px-3 py-2 bg-white border rounded-lg shadow-sm text-sm font-bold text-slate-700" draggable="true" data-correct="${i.c}">${i.t}</div>
            `).join('');
            initDnd();
        }

        function initDnd() {
            const items = document.querySelectorAll('.item-card');
            const targets = document.querySelectorAll('.zone-drop, #pool');
            items.forEach(el => {
                el.ondragstart = () => { dragged = el; el.style.opacity = "0.5"; };
                el.ondragend = () => { dragged = null; el.style.opacity = "1"; };
                el.ontouchstart = (e) => { dragged = el; };
                el.ontouchend = (e) => {
                    const t = e.changedTouches[0];
                    const target = document.elementFromPoint(t.clientX, t.clientY)?.closest('.zone-drop, #pool');
                    if (target && dragged) target.appendChild(dragged);
                    dragged = null;
                };
            });
            targets.forEach(t => {
                t.ondragover = (e) => { e.preventDefault(); t.classList.add('drop-active'); };
                t.ondragleave = () => t.classList.remove('drop-active');
                t.ondrop = (e) => { e.preventDefault(); t.classList.remove('drop-active'); if (dragged) t.appendChild(dragged); };
            });
        }

        document.getElementById('check-btn').onclick = () => {
            let correct = 0;
            document.querySelectorAll('.item-card').forEach(el => {
                const zone = el.closest('.zone-drop');
                if (zone && zone.dataset.cid === el.dataset.correct) {
                    el.classList.add('correct'); el.draggable = false; correct++;
                } else if (zone) {
                    document.getElementById('pool').appendChild(el);
                    el.classList.add('shake'); setTimeout(() => el.classList.remove('shake'), 400);
                }
            });
            if (correct === data.items.length) {
                clearInterval(timerInt);
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('save-btn').classList.remove('hidden');
            }
        };

        document.getElementById('save-btn').onclick = async () => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const timeStr = document.getElementById('timer').innerText;
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('leaderboard-ui').classList.remove('hidden');
            if (window.db) {
                const { db, firestoreRefs, appId } = window;
                await firestoreRefs.addDoc(firestoreRefs.collection(db, 'artifacts', appId, 'public', 'data', 'history'), {
                    name: playerName, time: timeStr, sec: elapsed, at: firestoreRefs.serverTimestamp()
                });
            }
        };

        function loadGoldBoard() {
            if (!window.db) return;
            const { db, firestoreRefs, appId } = window;
            const q = firestoreRefs.query(firestoreRefs.collection(db, 'artifacts', appId, 'public', 'data', 'history'), firestoreRefs.orderBy('sec', 'asc'));
            firestoreRefs.onSnapshot(q, (snap) => {
                document.getElementById('board-rows').innerHTML = snap.docs.slice(0, 10).map((d, i) => {
                    const item = d.data();
                    return `<tr class="border-b ${item.name === playerName ? 'bg-amber-50' : ''}">
                        <td class="p-4 font-black text-slate-400 w-12 text-center">${i+1}</td>
                        <td class="p-4 font-bold text-slate-700">${item.name}</td>
                        <td class="p-4 text-right font-mono font-black text-indigo-600">${item.time}</td>
                    </tr>`;
                }).join('') || '<tr><td class="p-10 text-center text-slate-400">Chưa có dữ liệu</td></tr>';
            });
        }
    </script>
</body>
</html>
